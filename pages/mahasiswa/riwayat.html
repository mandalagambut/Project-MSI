<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Konsultasi | Narasa</title>

    <link rel="stylesheet" href="riwayat.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <h2>NARASA</h2>
                <span>Mahasiswa</span>
            </div>
            <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
        </div>

        <nav class="menu">
            <a href="mahasiswa-dashboard.html">📊 Dashboard</a>
            <a href="pengajuan.html">📝 Ajukan Konsultasi</a>
            <a href="#" class="active">📋 Riwayat Konsultasi</a>
            <a href="notifikasi.html">🔔 Notifikasi</a>
            <a href="profil.html">👤 Profil</a>
            <a href="../../index.html" onclick="logout()">🚪 Logout</a>
        </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- MAIN CONTENT -->
    <main class="content">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <div>
                    <h1>📋 Riwayat Konsultasi</h1>
                    <p id="namaMahasiswa">User</p>
                </div>
            </div>
            <div class="topbar-actions">
                <button onclick="toggleTheme()" class="theme-btn">🌓</button>
                <button onclick="exportRiwayat()" class="export-btn">📥 Export</button>
                <button onclick="refreshRiwayat()" class="refresh-btn">🔄</button>
            </div>
        </header>

        <!-- FILTER -->
        <div class="filter-section">
            <div class="card filter-card">
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="filterStatus">Status</label>
                        <select id="filterStatus" class="form-control" onchange="applyFilter()">
                            <option value="semua">Semua Status</option>
                            <option value="pending">⏳ Menunggu</option>
                            <option value="disetujui">✅ Disetujui</option>
                            <option value="selesai">📌 Selesai</option>
                            <option value="ditolak">❌ Ditolak</option>
                            <option value="dibatalkan">🚫 Dibatalkan</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterKategori">Kategori</label>
                        <select id="filterKategori" class="form-control" onchange="applyFilter()">
                            <option value="semua">Semua Kategori</option>
                            <option value="akademik">📚 Akademik</option>
                            <option value="non-akademik">🎯 Non-Akademik</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="searchRiwayat">Cari</label>
                        <input type="text" id="searchRiwayat" class="form-control" placeholder="Cari judul atau dosen..." oninput="applyFilter()">
                    </div>
                </div>
            </div>
        </div>

        <!-- RIWAYAT LIST -->
        <section class="riwayat-section">
            <div class="card riwayat-card">
                <div class="riwayat-header">
                    <h3>Daftar Konsultasi</h3>
                    <span class="total-count" id="totalCount">0 konsultasi</span>
                </div>
                <div id="riwayatList">
                    <!-- Diisi oleh JavaScript -->
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">📭</div>
                        <h4>Belum Ada Riwayat Konsultasi</h4>
                        <p>Anda belum memiliki riwayat konsultasi. Ajukan konsultasi sekarang!</p>
                        <a href="pengajuan.html" class="btn-primary">📝 Ajukan Konsultasi</a>
                    </div>
                </div>
            </div>
        </section>

    </main>

</div>

<script src="riwayat.js"></script>

</body>
</html>
